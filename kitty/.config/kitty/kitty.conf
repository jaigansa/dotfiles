include Catppuccin-Mocha.conf
# --- Font Rendering ---
font_family      CommitMonoCustom
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

# Slightly tighter cell height can feel more "pro," 
# but 110% is great for readability.
modify_font cell_height 110%
disable_ligatures always

# --- Cursor & Performance ---
cursor_shape     block
# Stops the shell from overriding your block cursor back to a beam
shell_integration no-cursor
cursor_trail     0
# Lowers CPU usage slightly by not checking for blink as often
cursor_blink_interval 0

# --- Window Look & Feel ---
hide_window_decorations yes
window_margin_width     16
# Allows the background to be slightly transparent (looks great on Hyprland)
# background_opacity 0.95 
confirm_os_window_close 0

# --- Keybindings ---
# Keep your no_op but add a shortcut to reload config instantly
map ctrl+shift+f5 load_config_file
map ctrl+shift+h  no_op
map ctrl+shift+l  no_op

# --- Bells & Misc ---
enable_audio_bell no
# Makes URLs clickable with a specific color
url_color #0087bd
url_style curly
