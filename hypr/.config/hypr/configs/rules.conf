# --- RULES (Clean Layout) ---
# Updated for Hyprland v0.54.2 (Unified windowrule syntax)
# See https://wiki.hypr.land/Configuring/Window-Rules/

# Floating rules for common apps
windowrule = float 1, match:class ^(pavucontrol)$
windowrule = float 1, match:class ^(blueman-manager)$
windowrule = float 1, match:class ^(nm-connection-editor)$
windowrule = float 1, match:class ^(org.kde.polkit-kde-authentication-agent-1)$

# Browser Opacity (Active, Inactive)
windowrule = opacity 0.95 0.90, match:class ^(firefox)$

# Scratchpad rule
windowrule = float 1, match:class ^(scratchpad)$
windowrule = size 80% 80%, match:class ^(scratchpad)$
windowrule = center 1, match:class ^(scratchpad)$

# Dialogs
windowrule = float 1, match:title ^(Open File)$
windowrule = float 1, match:title ^(Save File)$

# --- SMART GAPS (No gaps/borders when only one tiled window is visible) ---
# w[tv1] = 1 visible tiled window, f[1] = maximized
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule = border_size 0, match:float 0, match:workspace w[tv1]
windowrule = rounding 0, match:float 0, match:workspace w[tv1]
windowrule = border_size 0, match:float 0, match:workspace f[1]
windowrule = rounding 0, match:float 0, match:workspace f[1]
