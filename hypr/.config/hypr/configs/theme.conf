# --- THEME (Modern & Vibrant) ---
general {
    gaps_in = 3
    gaps_out = 8
    border_size = 2
    
    # Modern Gradient (Lavender to Blue)
    col.active_border = rgba(cba6f7ff) rgba(89b4faff) 45deg
    col.inactive_border = rgba(585b70aa)

    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 10
    
    active_opacity = 0.95
    inactive_opacity = 0.90
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 6
        passes = 3
        ignore_opacity = true
        xray = true
    }

    shadow {
        enabled = false
        range = 15
        render_power = 3
        color = rgba(1a1a1aee)
    }
}
