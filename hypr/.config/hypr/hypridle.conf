# --- HYPRIDLE CONFIG ---
# Synchronized with hyprlock

general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock instances.
    before_sleep_cmd = loginctl lock-session    # lock before suspend.
    after_sleep_cmd = hyprctl dispatch dpms on  # to avoid having to press a key twice to turn on the display.
    
    # Sync with hyprlock state
    on_lock_cmd = notify-send "Locked"          # optional notification
    on_unlock_cmd = notify-send "Unlocked"      # optional notification
    
    # Sleep inhibition (wait for hyprlock before sleeping)
    # 3 = lock notify: wait for lock-screen app to successfully lock before sleep.
    inhibit_sleep = 3
}

# Screen Dimming (2.5 mins)
listener {
    timeout = 150                                # 2.5min.
    on-timeout = brightnessctl -s set 10         # set monitor backlight to minimum.
    on-resume = brightnessctl -r                 # monitor backlight restore.
}

# Lock Screen (5 mins)
listener {
    timeout = 300                                # 5min
    on-timeout = loginctl lock-session           # lock screen when timeout has passed
}

# Screen Off (5.5 mins)
listener {
    timeout = 330                                # 5.5min
    on-timeout = hyprctl dispatch dpms off       # screen off when timeout has passed
    on-resume = hyprctl dispatch dpms on         # screen on when activity is detected
}

# Suspend (30 mins)
listener {
    timeout = 1800                               # 30min
    on-timeout = systemctl suspend               # suspend pc
}
